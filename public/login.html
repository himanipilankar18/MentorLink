<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MentorLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .login-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100vw;
            height: 100vh;
        }

        .login-container {
            background: #000000;
            padding: 30px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.5s ease;
            overflow-y: auto;
        }

        .login-container::-webkit-scrollbar {
            width: 4px;
        }

        .login-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .login-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .form-box {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: left;
            margin-bottom: 30px;
        }

        .welcome-text {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .header h2 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.8px;
            animation: slideInLeft 0.6s ease-out 0.1s backwards;
        }

        .header p {
            color: #888888;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideInLeft 0.6s ease-out 0.2s backwards;
        }

        /* Right Side - Illustration */
        .illustration-section {
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .illustration {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #c4b5fd 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .person-illustration {
            width: 150px;
            height: 190px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 75px 75px 55px 55px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 28px;
        }

        .person-head {
            width: 70px;
            height: 70px;
            background: #1f2937;
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .person-face {
            position: absolute;
            width: 9px;
            height: 9px;
            background: #f59e0b;
            border-radius: 50%;
            top: 27px;
        }

        .person-face.eye-left { left: 18px; }
        .person-face.eye-right { right: 18px; }

        .person-mouth {
            position: absolute;
            width: 22px;
            height: 11px;
            border: 2px solid #f59e0b;
            border-top: none;
            border-radius: 0 0 22px 22px;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
        }

        .hand {
            width: 32px;
            height: 38px;
            background: #fde68a;
            border-radius: 16px;
            position: absolute;
            top: 85px;
        }

        .hand.left {
            left: -15px;
            transform: rotate(-20deg);
        }

        .hand.right {
            right: -15px;
            transform: rotate(20deg);
        }

        .like-icon {
            position: absolute;
            top: 30px;
            right: 50px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: bounce 2s ease-in-out infinite;
            box-shadow: 0 8px 24px rgba(254, 243, 199, 0.4);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .decorative-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .shape {
            position: absolute;
            opacity: 0.7;
        }

        .shape-circle {
            width: 20px;
            height: 20px;
            border: 3px solid #fef3c7;
            border-radius: 50%;
        }

        .shape-triangle {
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 22px solid #fde68a;
        }

        .shape-dash {
            width: 28px;
            height: 4px;
            background: #fef3c7;
            border-radius: 2px;
        }

        .shape:nth-child(1) { top: 45px; left: 40px; }
        .shape:nth-child(2) { top: 110px; right: 45px; }
        .shape:nth-child(3) { bottom: 90px; left: 45px; }
        .shape:nth-child(4) { bottom: 45px; right: 50px; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #cccccc;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
            letter-spacing: -0.2px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(26, 26, 26, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            color: #ffffff;
            font-family: inherit;
            letter-spacing: -0.1px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus,
        .form-group input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px rgba(26, 26, 26, 0.8) inset !important;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.4);
            background: rgba(31, 31, 31, 0.9);
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1), inset 0 1px 3px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .form-group input::placeholder {
            color: #555555;
        }

        .forgot-password {
            display: inline-block;
            margin-top: 6px;
            color: #888888;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
            color: #aaaaaa;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffffff 0%, #f7f7f7 100%);
            color: #000000;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            letter-spacing: -0.3px;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
            transition: all 0.1s ease;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .register-link {
            text-align: left;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1f1f1f;
            color: #666666;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #888888;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
            color: #aaaaaa;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #666666;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .back-link:hover {
            color: #888888;
        }

        @media (max-width: 1024px) {
            .login-wrapper {
                grid-template-columns: 1fr;
            }

            .illustration-section {
                display: none;
            }

            .login-container {
                padding: 50px 40px;
            }
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 40px 30px;
            }

            .header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side - Form -->
        <div class="login-container">
            <a href="index.html" class="back-link">
                ← Back to Home
            </a>

            <div class="form-box">
                <div class="header">
                    <div class="welcome-text">Welcome to MentorLink</div>
                    <h2>Welcome back</h2>
                    <p>Sign in to continue your journey</p>
                </div>

                <div id="message" class="message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">SPIT Email</label>
                        <input type="email" id="email" name="email" required placeholder="your.name@spit.ac.in">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                        <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn" id="submitBtn">Login</button>
                </form>

                <div class="register-link">
                    Don't have an account? <a href="register.html">Sign up</a>
                </div>
            </div>
        </div>

        <!-- Right Side - Illustration -->
        <div class="illustration-section">
            <div class="illustration">
                <div class="decorative-shapes">
                    <div class="shape shape-circle"></div>
                    <div class="shape shape-triangle"></div>
                    <div class="shape shape-circle"></div>
                    <div class="shape shape-dash"></div>
                </div>
                
                <div class="person-illustration">
                    <div class="person-head">
                        <div class="person-face eye-left"></div>
                        <div class="person-face eye-right"></div>
                        <div class="person-mouth"></div>
                    </div>
                    <div class="hand left"></div>
                    <div class="hand right"></div>
                </div>
                
                <div class="like-icon">👍</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            const formData = {
                email: document.getElementById('email').value.trim().toLowerCase(),
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    localStorage.setItem('mentorlink_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'home.html';
                        }
                    }, 1000);
                } else {
                    let errorMessage = data.message || 'Login failed. Please try again.';
                    if (data.errors && data.errors.length > 0) {
                        errorMessage = data.errors.map(err => err.msg).join('. ');
                    }
                    showMessage(errorMessage, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                showMessage('Network error. Please check your connection and try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
