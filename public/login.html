<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in · MentorLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-soft: #f5f5f7;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --accent-purple: #8B5CF6;
            --accent-blue: #3B82F6;
            --accent-pink: #EC4899;
            --accent-green: #10B981;
            --gradient-splash: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 25%, #10B981 50%, #EC4899 100%);
            --shadow-soft: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-elevated: 0 12px 48px rgba(0,0,0,0.08);
            --radius-xl: 20px;
            --radius-lg: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-soft);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f5f5f7 0%, #e8eef4 30%, #f5eef8 60%, #e8f4f0 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: -1;
        }
        .orb-1 { width: 350px; height: 350px; background: var(--accent-purple); top: -80px; right: -80px; animation: float 18s ease-in-out infinite; }
        .orb-2 { width: 280px; height: 280px; background: var(--accent-pink); bottom: -60px; left: -60px; animation: float 20s ease-in-out infinite 3s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 32px;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--accent-purple); }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: var(--shadow-elevated);
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: var(--gradient-splash);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .logo-row h1 {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: var(--radius-lg);
            margin-bottom: 32px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            color: var(--text-primary);
            box-shadow: var(--shadow-soft);
        }

        .tab:hover:not(.active) { color: var(--text-primary); }

        .form-panel {
            display: none;
        }

        .form-panel.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .form-group input::placeholder { color: #9ca3af; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--text-primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .message.show { display: block; animation: fadeIn 0.4s ease; }

        .message.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .message.success {
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .footer-text a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <a href="landing.html" class="back-link">← Back to home</a>

        <div class="login-card">
            <div class="logo-row">
                <div class="logo-icon">ML</div>
                <h1>MentorLink</h1>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">Log in</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <div id="message" class="message"></div>

            <!-- Login form -->
            <div id="login-panel" class="form-panel active">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="you@spit.ac.in" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary" id="login-btn">Log in</button>
                </form>
            </div>

            <!-- Register form -->
            <div id="register-panel" class="form-panel">
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label>Email (Institute)</label>
                        <input type="email" name="email" placeholder="you@spit.ac.in" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Min 6 characters" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" name="year" placeholder="1-4" min="1" max="4" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select name="department" required style="width:100%;padding:14px 18px;border:2px solid #e5e7eb;border-radius:14px;font-size:1rem;font-family:inherit;">
                            <option value="">Select</option>
                            <option value="CSE">CSE</option>
                            <option value="IT">IT</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="MECH">MECH</option>
                            <option value="CIVIL">CIVIL</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" required style="width:100%;padding:14px 18px;border:2px solid #e5e7eb;border-radius:14px;font-size:1rem;font-family:inherit;">
                            <option value="junior">Junior</option>
                            <option value="senior">Senior</option>
                            <option value="faculty">Faculty</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="register-btn">Create account</button>
                </form>
            </div>
        </div>

        <p class="footer-text">Use your institute email (e.g. @spit.ac.in) to register</p>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
                hideMessage();
            });
        });

        function showMessage(text, type = 'error') {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = 'message show ' + type;
        }

        function hideMessage() {
            document.getElementById('message').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                const data = await res.json();

                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    showMessage(data.message || 'Login failed');
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                }
            } catch (err) {
                showMessage('Could not connect. Is the server running?');
                btn.disabled = false;
                btn.textContent = 'Log in';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch(API_BASE + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: form.name.value,
                        email: form.email.value,
                        password: form.password.value,
                        year: parseInt(form.year.value),
                        department: form.department.value,
                        role: form.role.value
                    })
                });
                const data = await res.json();

                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
                } else {
                    showMessage(data.message || 'Registration failed');
                    btn.disabled = false;
                    btn.textContent = 'Create account';
                }
            } catch (err) {
                showMessage('Could not connect. Is the server running?');
                btn.disabled = false;
                btn.textContent = 'Create account';
            }
        }
    </script>
</body>
</html>
