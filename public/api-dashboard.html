<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorConnect - API Testing Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            background: #f9f9f9;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            max-height: 400px;
            overflow-y: auto;
        }

        .response pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .token-display {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
            font-size: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-online {
            background: #28a745;
            box-shadow: 0 0 10px #28a745;
        }

        .status-offline {
            background: #dc3545;
            box-shadow: 0 0 10px #dc3545;
        }

        .api-url {
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 MentorConnect API Testing Dashboard</h1>
            <p>Test your backend API endpoints easily</p>
            <div style="margin-top: 15px;">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText">Checking connection...</span>
            </div>
        </div>

        <div class="content">
            <!-- API Configuration -->
            <div class="section">
                <h2>⚙️ API Configuration</h2>
                <div class="form-group">
                    <label>API Base URL:</label>
                    <input type="text" id="apiUrl" value="http://localhost:5000/api" placeholder="http://localhost:5000/api">
                </div>
                <button onclick="checkConnection()">Check Connection</button>
            </div>

            <!-- Authentication -->
            <div class="section">
                <h2>🔐 Authentication</h2>
                <div class="grid">
                    <div>
                        <h3 style="margin-bottom: 15px; color: #667eea;">Register</h3>
                        <div class="form-group">
                            <label>Name:</label>
                            <input type="text" id="regName" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email:</label>
                            <input type="email" id="regEmail" placeholder="john@spit.ac.in">
                        </div>
                        <div class="form-group">
                            <label>Password:</label>
                            <input type="password" id="regPassword" placeholder="SecurePass123">
                        </div>
                        <div class="form-group">
                            <label>Year:</label>
                            <select id="regYear">
                                <option value="1">Year 1</option>
                                <option value="2" selected>Year 2</option>
                                <option value="3">Year 3</option>
                                <option value="4">Year 4</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Department:</label>
                            <select id="regDepartment">
                                <option value="CSE" selected>CSE</option>
                                <option value="IT">IT</option>
                                <option value="ECE">ECE</option>
                                <option value="EEE">EEE</option>
                                <option value="MECH">MECH</option>
                                <option value="CIVIL">CIVIL</option>
                                <option value="CHEM">CHEM</option>
                                <option value="OTHER">OTHER</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Role:</label>
                            <select id="regRole">
                                <option value="junior" selected>Junior</option>
                                <option value="senior">Senior</option>
                                <option value="faculty">Faculty</option>
                            </select>
                        </div>
                        <button onclick="register()">Register</button>
                    </div>
                    <div>
                        <h3 style="margin-bottom: 15px; color: #667eea;">Login</h3>
                        <div class="form-group">
                            <label>Email:</label>
                            <input type="email" id="loginEmail" placeholder="john@spit.ac.in">
                        </div>
                        <div class="form-group">
                            <label>Password:</label>
                            <input type="password" id="loginPassword" placeholder="SecurePass123">
                        </div>
                        <button onclick="login()">Login</button>
                        <button class="btn-secondary" onclick="getCurrentUser()">Get Current User</button>
                    </div>
                </div>
                <div id="tokenDisplay" class="token-display" style="display: none;">
                    <strong>Token:</strong> <span id="tokenValue"></span>
                </div>
                <div id="authResponse" class="response" style="display: none;"></div>
            </div>

            <!-- Mentorship -->
            <div class="section">
                <h2>🤝 Mentorship</h2>
                <div class="form-group">
                    <label>Mentor ID (for requesting mentorship):</label>
                    <input type="text" id="mentorId" placeholder="Paste mentor's user ID">
                </div>
                <button onclick="requestMentorship()">Request Mentorship</button>
                <button class="btn-secondary" onclick="getMyRequests()">Get My Requests</button>
                <button class="btn-success" onclick="getActiveMentorships()">Get Active Mentorships</button>
                <div id="mentorshipResponse" class="response" style="display: none;"></div>
            </div>

            <!-- Interactions -->
            <div class="section">
                <h2>📊 Interactions (Critical for Analytics)</h2>
                <div class="form-group">
                    <label>Mentor ID:</label>
                    <input type="text" id="interactionMentorId" placeholder="Mentor's user ID">
                </div>
                <div class="form-group">
                    <label>Mentorship ID:</label>
                    <input type="text" id="interactionMentorshipId" placeholder="Mentorship ID">
                </div>
                <div class="form-group">
                    <label>Topic:</label>
                    <input type="text" id="interactionTopic" placeholder="Data Structures - Binary Trees">
                </div>
                <div class="form-group">
                    <label>Subject Tag:</label>
                    <select id="interactionSubjectTag">
                        <option value="Data Structures">Data Structures</option>
                        <option value="Algorithms">Algorithms</option>
                        <option value="Database Systems">Database Systems</option>
                        <option value="Machine Learning">Machine Learning</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Interaction Type:</label>
                    <select id="interactionType">
                        <option value="Chat">Chat</option>
                        <option value="Video Call">Video Call</option>
                        <option value="In-Person">In-Person</option>
                        <option value="Email">Email</option>
                        <option value="Forum Discussion">Forum Discussion</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Duration (minutes):</label>
                    <input type="number" id="interactionDuration" placeholder="45">
                </div>
                <div class="form-group">
                    <label>Satisfaction Rating (1-5):</label>
                    <input type="number" id="interactionRating" min="1" max="5" placeholder="5">
                </div>
                <button onclick="logInteraction()">Log Interaction</button>
                <button class="btn-secondary" onclick="getInteractions()">Get Interactions</button>
                <button class="btn-success" onclick="getInteractionStats()">Get Statistics</button>
                <div id="interactionResponse" class="response" style="display: none;"></div>
            </div>

            <!-- Discussions -->
            <div class="section">
                <h2>💬 Discussions</h2>
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="discussionTitle" placeholder="How to implement Dijkstra's algorithm?">
                </div>
                <div class="form-group">
                    <label>Content:</label>
                    <textarea id="discussionContent" placeholder="I'm struggling with..."></textarea>
                </div>
                <div class="form-group">
                    <label>Subject Tag:</label>
                    <select id="discussionSubjectTag">
                        <option value="Algorithms">Algorithms</option>
                        <option value="Data Structures">Data Structures</option>
                        <option value="Database Systems">Database Systems</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button onclick="createDiscussion()">Create Discussion</button>
                <button class="btn-secondary" onclick="getDiscussions()">Get Discussions</button>
                <div id="discussionResponse" class="response" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = document.getElementById('apiUrl');
        let authToken = localStorage.getItem('mentorlink_token') || '';

        // Check connection on load
        window.onload = () => {
            checkConnection();
            if (authToken) {
                document.getElementById('tokenDisplay').style.display = 'block';
                document.getElementById('tokenValue').textContent = authToken.substring(0, 50) + '...';
            }
        };

        function getApiUrl() {
            return API_URL.value || 'http://localhost:5000/api';
        }

        function getHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            return headers;
        }

        async function checkConnection() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            try {
                const response = await fetch(`${getApiUrl()}/health`);
                const data = await response.json();
                
                if (data.success) {
                    statusIndicator.className = 'status-indicator status-online';
                    statusText.textContent = 'Connected to API';
                } else {
                    throw new Error('API not responding correctly');
                }
            } catch (error) {
                statusIndicator.className = 'status-indicator status-offline';
                statusText.textContent = 'Connection failed - ' + error.message;
            }
        }

        function showResponse(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = 'response ' + (isError ? 'error' : 'success');
            element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }

        async function register() {
            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                year: parseInt(document.getElementById('regYear').value),
                department: document.getElementById('regDepartment').value,
                role: document.getElementById('regRole').value
            };

            try {
                const response = await fetch(`${getApiUrl()}/auth/register`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success && result.token) {
                    authToken = result.token;
                    localStorage.setItem('mentorlink_token', authToken);
                    document.getElementById('tokenDisplay').style.display = 'block';
                    document.getElementById('tokenValue').textContent = authToken.substring(0, 50) + '...';
                    showResponse('authResponse', result);
                } else {
                    showResponse('authResponse', result, true);
                }
            } catch (error) {
                showResponse('authResponse', { error: error.message }, true);
            }
        }

        async function login() {
            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch(`${getApiUrl()}/auth/login`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success && result.token) {
                    authToken = result.token;
                    localStorage.setItem('mentorlink_token', authToken);
                    document.getElementById('tokenDisplay').style.display = 'block';
                    document.getElementById('tokenValue').textContent = authToken.substring(0, 50) + '...';
                    showResponse('authResponse', result);
                } else {
                    showResponse('authResponse', result, true);
                }
            } catch (error) {
                showResponse('authResponse', { error: error.message }, true);
            }
        }

        async function getCurrentUser() {
            try {
                const response = await fetch(`${getApiUrl()}/auth/me`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('authResponse', result, !result.success);
            } catch (error) {
                showResponse('authResponse', { error: error.message }, true);
            }
        }

        async function requestMentorship() {
            const mentorId = document.getElementById('mentorId').value;
            if (!mentorId) {
                alert('Please enter Mentor ID');
                return;
            }

            const reason = prompt('Enter mentorship request reason (minimum 20 characters):', 'I would like guidance on academic planning and project direction.');
            if (!reason || reason.trim().length < 20) {
                alert('Reason is required and must be at least 20 characters');
                return;
            }

            try {
                const response = await fetch(`${getApiUrl()}/mentorship/request`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ recipientId: mentorId, reason: reason.trim() })
                });
                const result = await response.json();
                showResponse('mentorshipResponse', result, !result.success);
            } catch (error) {
                showResponse('mentorshipResponse', { error: error.message }, true);
            }
        }

        async function getMyRequests() {
            try {
                const response = await fetch(`${getApiUrl()}/mentorship/my-requests`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('mentorshipResponse', result, !result.success);
            } catch (error) {
                showResponse('mentorshipResponse', { error: error.message }, true);
            }
        }

        async function getActiveMentorships() {
            try {
                const response = await fetch(`${getApiUrl()}/mentorship/active`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('mentorshipResponse', result, !result.success);
            } catch (error) {
                showResponse('mentorshipResponse', { error: error.message }, true);
            }
        }

        async function logInteraction() {
            const data = {
                mentorId: document.getElementById('interactionMentorId').value,
                mentorshipId: document.getElementById('interactionMentorshipId').value,
                topic: document.getElementById('interactionTopic').value,
                subjectTag: document.getElementById('interactionSubjectTag').value,
                interactionType: document.getElementById('interactionType').value,
                duration: parseInt(document.getElementById('interactionDuration').value) || null,
                satisfactionRating: parseInt(document.getElementById('interactionRating').value) || null
            };

            try {
                const response = await fetch(`${getApiUrl()}/interactions`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showResponse('interactionResponse', result, !result.success);
            } catch (error) {
                showResponse('interactionResponse', { error: error.message }, true);
            }
        }

        async function getInteractions() {
            try {
                const response = await fetch(`${getApiUrl()}/interactions`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('interactionResponse', result, !result.success);
            } catch (error) {
                showResponse('interactionResponse', { error: error.message }, true);
            }
        }

        async function getInteractionStats() {
            try {
                const response = await fetch(`${getApiUrl()}/interactions/stats`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('interactionResponse', result, !result.success);
            } catch (error) {
                showResponse('interactionResponse', { error: error.message }, true);
            }
        }

        async function createDiscussion() {
            const data = {
                title: document.getElementById('discussionTitle').value,
                content: document.getElementById('discussionContent').value,
                subjectTag: document.getElementById('discussionSubjectTag').value
            };

            try {
                const response = await fetch(`${getApiUrl()}/discussions`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showResponse('discussionResponse', result, !result.success);
            } catch (error) {
                showResponse('discussionResponse', { error: error.message }, true);
            }
        }

        async function getDiscussions() {
            try {
                const response = await fetch(`${getApiUrl()}/discussions`, {
                    headers: getHeaders()
                });
                const result = await response.json();
                showResponse('discussionResponse', result, !result.success);
            } catch (error) {
                showResponse('discussionResponse', { error: error.message }, true);
            }
        }
    </script>
</body>
</html>
